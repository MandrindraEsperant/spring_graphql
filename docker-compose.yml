version: '3.8'

services:

  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: spring-graphql-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: spring_graphql
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - spring-graphql-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spring_graphql"]
      interval: 5s
      timeout: 3s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 512M


  # ─── Spring Boot App ──────────────────────────────────
  app:
    image: mandrindraesperant/spring-graphql:latest
    container_name: spring-graphql-app

    restart: unless-stopped

    ports:
      - "8088:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spring_graphql
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

      JAVA_OPTS: >
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - spring-graphql-net

    deploy:
      resources:
        limits:
          memory: 768M


# ─── Réseau ─────────────────────────────────────────────
networks:
  spring-graphql-net:
    driver: bridge


# ─── Volumes ────────────────────────────────────────────
volumes:
  postgres_data: